# Render Blueprint — https://render.com/docs/blueprint-spec
# Models + tabular are in the Git repo and COPY’d into the Docker image.
# Set GROQ_API_KEY in the dashboard (secret) for LLM reports.
# Free tier: no card required for instance (see Render "Deploy for Free").
# PyTorch + CNN may OOM or hit slow cold starts — upgrade only if needed.

version: "1"

services:
  - type: web
    name: coralguard-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: CORALGUARD_DEVICE
        value: cpu
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
